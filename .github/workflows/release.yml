name: Package and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ZIP_NAME="LootLedger - ${VERSION}.zip"
          mkdir LootLedger
          cp LootLedger.lua LootLedger.toc Bindings.xml LootLedger/
          zip -r "${ZIP_NAME}" LootLedger/
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Create GitHub release with zip
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

      - name: Upload to CurseForge
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          VERSION_ID=$(curl -s \
            -H "X-Api-Token: $CF_TOKEN" \
            "https://wow.curseforge.com/api/game/versions" | \
            jq '[.[] | select(.name == "2.5.5")] | .[0].id')

          METADATA=$(jq -n \
            --argjson versions "[$VERSION_ID]" \
            '{changelog: "", changelogType: "text", gameVersions: $versions, releaseType: "release"}')

          curl -X POST \
            -H "X-Api-Token: $CF_TOKEN" \
            -F "metadata=$METADATA" \
            -F "file=@${{ env.ZIP_NAME }}" \
            "https://wow.curseforge.com/api/projects/1518759/upload-file"
