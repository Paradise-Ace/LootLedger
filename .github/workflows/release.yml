name: Package and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          mkdir LootLedger
          cp LootLedger.lua LootLedger.toc Bindings.xml LootLedger/
          zip -r LootLedger.zip LootLedger/

      - name: Create release with zip
        uses: softprops/action-gh-release@v2
        with:
          files: LootLedger.zip
          generate_release_notes: true
